<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulasi Kelayakan PTN</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=1.0">
</head>
  
<body>
  <div class="vh-100 d-flex align-items-center bg-light">
    <button class="btn btn-primary btn-lg px-5" data-toggle="modal" data-target="#modalCek">
      Cek Kelayakan
    </button>
  </div>
  
<!-- POPUP FORM -->
<div class="modal fade" id="modalCek">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header custom-bg-gradient text-white">
        <h5 class="modal-title text-center">Simulasi Kelayakan PTN</h5>
        <button type="button" class="close text-white" data-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <div id="warningBox" class="d-none">
          ⚠️ Silakan isi nilai terlebih dahulu
        </div>

        <!-- KELAS 10 -->
        <div class="card mb-3 border-0 shadow">
          <p class="text-center font-weight-bold">Masukkan Nilai Rapor</p>
          <p class="text-center text-muted">Nilai Matematika, IPA, dan Bahasa Inggris untuk kelas 7 & 8</p>
          <div class="card-body">
            <h6 class="font-weight-bold text-center">Kelas 10</h6>
            <div class="row">
              <div class="col-md-6">
                <small class="text-muted">Semester 1</small>
                <input type="number" class="form-control mb-2 nilai" placeholder="Matematika">
                <input type="number" class="form-control mb-2 nilai" placeholder="IPA">
                <input type="number" class="form-control mb-2 nilai" placeholder="Bahasa Inggris">
              </div>
              <div class="col-md-6">
                <small class="text-muted">Semester 2</small>
                <input type="number" class="form-control mb-2 nilai" placeholder="Matematika">
                <input type="number" class="form-control mb-2 nilai" placeholder="IPA">
                <input type="number" class="form-control mb-2 nilai" placeholder="Bahasa Inggris">
              </div>
            </div>
          </div>
        </div>

        <!-- KELAS 11 -->
        <div class="card mb-3 border-0 shadow">
          <div class="card-body">
            <h6 class="font-weight-bold text-center">Kelas 11</h6>
            <div class="row">
              <div class="col-md-6">
                <small class="text-muted">Semester 1</small>
                <input type="number" class="form-control mb-2 nilai" placeholder="Matematika">
                <input type="number" class="form-control mb-2 nilai" placeholder="IPA">
                <input type="number" class="form-control mb-2 nilai" placeholder="Bahasa Inggris">
              </div>
              <div class="col-md-6">
                <small class="text-muted">Semester 2</small>
                <input type="number" class="form-control mb-2 nilai" placeholder="Matematika">
                <input type="number" class="form-control mb-2 nilai" placeholder="IPA">
                <input type="number" class="form-control mb-2 nilai" placeholder="Bahasa Inggris">
              </div>
            </div>
          </div>
        </div>

        <button class="btn btn-primary" onclick="cekHasil()">Uji Hasil</button>
        <button class="btn btn-outline-primary" data-dismiss="modal">Tutup</button>
      </div>
    </div>
  </div>
</div>

<!-- POPUP HASIL -->
<div class="modal fade" id="modalHasil">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content p-4">

      <h4 class="mb-3 text-center">Hasil Evaluasi</h4>

      <p id="hasilStatus"></p>
      <p id="hasilRata"></p>
    
      <div class="text-center mt-3">
        <button class="btn btn-outline-primary px-4" data-dismiss="modal">
          Tutup
        </button>
      </div>

    </div>
  </div>
</div>
  
  <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
  <script src="script.js?v=1.0"></script>  
</body>
</html>
